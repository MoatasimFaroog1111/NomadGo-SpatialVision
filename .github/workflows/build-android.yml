name: Build Android APK (Release)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  buildForAndroid:
    name: Build for Android (Release Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build Android APK (Release)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1
          targetPlatform: Android
          androidExportType: androidPackage
          androidTargetSdkVersion: AndroidApiLevel34
          androidMinSdkVersion: AndroidApiLevel24
          androidArchitecture: ARM64
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          buildName: NomadGo-SpatialVision
          versioning: Semantic
          allowDirtyBuild: true

      - name: Patch APK - Fix glEsVersion for Moto G84 5G
        run: |
          APK=$(find build/Android -name "*.apk" | head -1)
          echo "Patching APK: $APK"
          pip3 install -q zipalign-fix 2>/dev/null || true
          
          python3 - "$APK" << 'PYEOF'
          import sys, zipfile, struct, os, shutil
          
          apk_path = sys.argv[1]
          print(f"Input APK: {apk_path} ({os.path.getsize(apk_path)//1024//1024}MB)")
          
          with zipfile.ZipFile(apk_path, 'r') as z:
              manifest_data = bytearray(z.read('AndroidManifest.xml'))
          
          patched = 0
          for i in range(0, len(manifest_data)-8, 4):
              val = struct.unpack_from('<I', manifest_data, i)[0]
              if val == 0x00030000:
                  if i >= 4:
                      prev = struct.unpack_from('<I', manifest_data, i-4)[0]
                      if prev == 0x11000008:
                          print(f"  Patching glEsVersion at offset {i}: 0x00030000 -> 0x00020000")
                          struct.pack_into('<I', manifest_data, i, 0x00020000)
                          patched += 1
          
          print(f"Patched {patched} occurrence(s)")
          
          tmp_apk = apk_path + ".tmp"
          with zipfile.ZipFile(apk_path, 'r') as zin:
              with zipfile.ZipFile(tmp_apk, 'w') as zout:
                  for item in zin.infolist():
                      if item.filename == 'AndroidManifest.xml':
                          zout.writestr(item, bytes(manifest_data))
                      else:
                          data = zin.read(item.filename)
                          zout.writestr(item, data)
          
          os.replace(tmp_apk, apk_path)
          print(f"Done! APK size: {os.path.getsize(apk_path)//1024//1024}MB")
          PYEOF

      - name: Re-sign Patched APK
        run: |
          APK=$(find build/Android -name "*.apk" | head -1)
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          
          sudo apt-get install -y zipalign apksigner 2>/dev/null || true
          
          zipalign -f -v -p 4 "$APK" "${APK}.aligned" 2>/dev/null && mv "${APK}.aligned" "$APK" || echo "zipalign skipped"
          
          apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEYALIAS_NAME }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYALIAS_PASS }}" \
            "$APK" 2>&1 || echo "Re-sign warning (may still work)"
          
          echo "Final APK:"
          ls -lh build/Android/

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NomadGo-SpatialVision-Release-APK
          path: build/Android
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "NomadGo SpatialVision v${{ github.run_number }}"
          body: |
            ## NomadGo SpatialVision - Release Build
            - Signed Release APK (arm64-v8a)
            - Min SDK: Android 7.0 (API 24)
            - Target SDK: Android 14 (API 34)
            - Compatible with Moto G84 5G (Android 15)
            - OpenGL ES 2.0 (patched for maximum compatibility)
            - ARCore optional
          files: build/Android/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
