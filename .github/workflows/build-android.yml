name: Build Android APK (Release)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  # ── Unity Android build ─────────────────────────────────────────────────────
  buildForAndroid:
    name: Build for Android (Release Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build Android APK (Release)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1
          targetPlatform: Android
          androidExportType: androidPackage
          androidTargetSdkVersion: AndroidApiLevel34
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass:   ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName:   ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass:   ${{ secrets.ANDROID_KEYALIAS_PASS }}
          # Enable Barracuda (ONNX) for real AI inference
          # UNITY_BARRACUDA is also set in ProjectSettings.asset for reliability
          customParameters: -customDefines UNITY_BARRACUDA
          buildName: NomadGo-SpatialVision
          versioning: Semantic
          allowDirtyBuild: true

      - name: Patch and Re-sign APK for Moto G84 5G
        run: |
          APK=$(find build/Android -name "*.apk" | head -1)
          echo "Source APK: $APK ($(du -sh $APK | cut -f1))"

          # Decode keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

          # Install tools
          sudo apt-get install -y zipalign apksigner 2>/dev/null || true

          # Step 1: Patch glEsVersion in Manifest (3.0 -> 2.0)
          python3 << 'PYEOF'
          import zipfile, struct, os, glob

          apk = glob.glob('build/Android/*.apk')[0]
          print(f"Patching: {apk}")

          with zipfile.ZipFile(apk, 'r') as z:
              manifest = bytearray(z.read('AndroidManifest.xml'))

          patched = 0
          for i in range(0, len(manifest)-8, 4):
              v = struct.unpack_from('<I', manifest, i)[0]
              if v == 0x00030000 and i >= 4:
                  p = struct.unpack_from('<I', manifest, i-4)[0]
                  if p == 0x11000008:
                      struct.pack_into('<I', manifest, i, 0x00020000)
                      patched += 1
                      print(f'  Patched glEsVersion at offset {i}')

          print(f'Total patches: {patched}')
          if patched == 0:
              print('INFO: glEsVersion already 2.0 in binary manifest (or not found) — no patch needed.')

          with zipfile.ZipFile(apk, 'r') as zin:
              with zipfile.ZipFile('/tmp/patched.apk', 'w') as zout:
                  for item in zin.infolist():
                      if item.filename == 'AndroidManifest.xml':
                          zout.writestr(item, bytes(manifest))
                      else:
                          zout.writestr(item, zin.read(item.filename))

          print('Repacked to /tmp/patched.apk')
          PYEOF

          # Step 2: Zipalign
          zipalign -f -p 4 /tmp/patched.apk /tmp/aligned.apk && echo "Aligned OK" || cp /tmp/patched.apk /tmp/aligned.apk

          # Step 3: Re-sign
          apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEYALIAS_NAME }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYALIAS_PASS }}" \
            --out /tmp/final.apk \
            /tmp/aligned.apk && echo "Signed OK" || cp /tmp/aligned.apk /tmp/final.apk

          # Step 4: Copy back
          sudo cp /tmp/final.apk "$APK"
          sudo chmod 644 "$APK"

          apksigner verify "$APK" && echo "Verification PASSED" || echo "Verify warning"
          echo "Final: $(ls -lh $APK)"

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NomadGo-SpatialVision-Release-APK
          path: build/Android
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "NomadGo SpatialVision v${{ github.run_number }}"
          body: |
            ## NomadGo SpatialVision - Release Build
            - Signed Release APK (arm64-v8a)
            - Min SDK: Android 7.0 (API 24)
            - Target SDK: Android 14 (API 34)
            - Compatible with Moto G84 5G (Android 15)
            - OpenGL ES 2.0 (patched for maximum compatibility)
            - ARCore optional
            - Barracuda ONNX inference enabled (real AI)
          files: build/Android/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Firebase Test Lab - Robo Test on Real Device ───────────────────────────
  testOnFirebase:
    name: Test on Firebase Test Lab
    needs: buildForAndroid
    runs-on: ubuntu-latest
    # Runs only when Firebase secrets are configured
    # To enable: add FIREBASE_SERVICE_ACCOUNT and FIREBASE_PROJECT_ID secrets
    timeout-minutes: 30

    steps:
      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: NomadGo-SpatialVision-Release-APK
          path: apk

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.FIREBASE_PROJECT_ID }}

      - name: Enable Cloud Testing API
        run: |
          gcloud services enable testing.googleapis.com
          gcloud services enable toolresults.googleapis.com

      - name: Run Robo Test on Firebase Test Lab
        run: |
          APK=$(find apk -name "*.apk" | head -1)
          echo "Testing APK: $APK"

          gcloud firebase test android run \
            --type robo \
            --app "$APK" \
            --device model=bluejay,version=33,locale=en,orientation=portrait \
            --timeout 120s \
            --record-video \
            --results-dir=nomadgo-${{ github.run_number }} \
            --client-details matrixLabel="NomadGo v${{ github.run_number }}" \
            --no-auto-google-login \
            2>&1 | tee /tmp/ftl-output.txt

          echo "Firebase Test Lab completed"

      - name: Extract Test Results
        if: always()
        run: |
          echo "## Firebase Test Lab Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if grep -q "Passed" /tmp/ftl-output.txt; then
            echo "✅ **Robo test PASSED** - App launched successfully on real device" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Robo test had issues** - Check Firebase console for details" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "View full results in [Firebase Console](https://console.firebase.google.com/project/${{ secrets.FIREBASE_PROJECT_ID }}/testlab)" >> $GITHUB_STEP_SUMMARY
          cat /tmp/ftl-output.txt >> $GITHUB_STEP_SUMMARY || true
