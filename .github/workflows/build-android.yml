name: Build Android APK (Release)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  buildForAndroid:
    name: Build for Android (Release Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Download YOLOv8n ONNX Model
        run: |
          pip install ultralytics --quiet
          python3 << 'PYEOF'
          from ultralytics import YOLO
          import shutil, os

          print("Downloading YOLOv8n and exporting to ONNX...")
          model = YOLO('yolov8n.pt')
          model.export(format='onnx', imgsz=640, simplify=True, opset=11, dynamic=False)

          os.makedirs('Assets/StreamingAssets/Models', exist_ok=True)
          shutil.copy('yolov8n.onnx', 'Assets/StreamingAssets/Models/yolov8n.onnx')

          size_mb = os.path.getsize('Assets/StreamingAssets/Models/yolov8n.onnx') / 1024 / 1024
          print(f'Model ready: {size_mb:.1f} MB -> Assets/StreamingAssets/Models/yolov8n.onnx')
          PYEOF
          echo "ONNX model: $(ls -lh Assets/StreamingAssets/Models/yolov8n.onnx)"

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build Android APK (Release)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1
          targetPlatform: Android
          androidExportType: androidPackage
          androidTargetSdkVersion: AndroidApiLevel34
          androidMinSdkVersion: AndroidApiLevel24
          androidArchitecture: ARM64
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          buildName: NomadGo-SpatialVision
          versioning: Semantic
          allowDirtyBuild: true

      - name: Patch and Re-sign APK for Moto G84 5G
        run: |
          APK=$(find build/Android -name "*.apk" | head -1)
          echo "Source APK: $APK ($(du -sh $APK | cut -f1))"
          
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          sudo apt-get install -y zipalign apksigner 2>/dev/null || true
          
          python3 << 'PYEOF'
          import zipfile, struct, os, glob

          apk = glob.glob('build/Android/*.apk')[0]
          print(f"Patching: {apk}")

          with zipfile.ZipFile(apk, 'r') as z:
              manifest = bytearray(z.read('AndroidManifest.xml'))

          patched = 0
          for i in range(0, len(manifest)-8, 4):
              v = struct.unpack_from('<I', manifest, i)[0]
              if v == 0x00030000 and i >= 4:
                  p = struct.unpack_from('<I', manifest, i-4)[0]
                  if p == 0x11000008:
                      struct.pack_into('<I', manifest, i, 0x00020000)
                      patched += 1
                      print(f'  Patched glEsVersion at offset {i}')

          print(f'Total patches: {patched}')

          with zipfile.ZipFile(apk, 'r') as zin:
              with zipfile.ZipFile('/tmp/patched.apk', 'w') as zout:
                  for item in zin.infolist():
                      if item.filename == 'AndroidManifest.xml':
                          zout.writestr(item, bytes(manifest))
                      else:
                          zout.writestr(item, zin.read(item.filename))
          print('Repacked to /tmp/patched.apk')
          PYEOF

          zipalign -f -p 4 /tmp/patched.apk /tmp/aligned.apk && echo "Aligned OK" || cp /tmp/patched.apk /tmp/aligned.apk

          apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEYALIAS_NAME }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYALIAS_PASS }}" \
            --out /tmp/final.apk \
            /tmp/aligned.apk && echo "Signed OK" || cp /tmp/aligned.apk /tmp/final.apk

          sudo cp /tmp/final.apk "$APK"
          sudo chmod 644 "$APK"
          apksigner verify "$APK" && echo "Verification PASSED" || echo "Verify warning"
          echo "Final: $(ls -lh $APK)"

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NomadGo-SpatialVision-Release-APK
          path: build/Android
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "NomadGo SpatialVision v${{ github.run_number }}"
          body: |
            ## NomadGo SpatialVision - Release Build
            - YOLOv8n ONNX model included in StreamingAssets (ready for Sentis integration)
            - AI demo mode: bottle, cup, bowl, apple, banana detection simulation
            - Signed Release APK (arm64-v8a)
            - Min SDK: Android 7.0 (API 24)
            - Target SDK: Android 14 (API 34)
            - Compatible with Moto G84 5G (Android 15)
            - OpenGL ES 2.0 (patched for maximum compatibility)
          files: build/Android/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
