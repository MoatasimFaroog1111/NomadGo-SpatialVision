name: Build Android APK (Release)
on:
  push:
    branches:
      - main
    paths:
      - 'Assets/**'
      - 'Packages/**'
      - 'ProjectSettings/**'
  workflow_dispatch: {}
jobs:
  buildForAndroid:
    name: Build for Android (Release Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Create AndroidManifest with OpenGL ES 2.0
        run: |
          mkdir -p Assets/Plugins/Android
          MANIFEST="Assets/Plugins/Android/AndroidManifest.xml"
          printf '%s\n' '<?xml version="1.0" encoding="utf-8"?>' > "$MANIFEST"
          printf '%s\n' '<manifest xmlns:android="http://schemas.android.com/apk/res/android" package="com.nomadgo.spatialvision" android:versionCode="1" android:versionName="1.0.0">' >> "$MANIFEST"
          printf '%s\n' '  <uses-sdk android:minSdkVersion="24" android:targetSdkVersion="34" />' >> "$MANIFEST"
          printf '%s\n' '  <uses-permission android:name="android.permission.INTERNET" />' >> "$MANIFEST"
          printf '%s\n' '  <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />' >> "$MANIFEST"
          printf '%s\n' '  <uses-permission android:name="android.permission.CAMERA" />' >> "$MANIFEST"
          printf '%s\n' '  <uses-feature android:glEsVersion="0x00020000" android:required="true" />' >> "$MANIFEST"
          printf '%s\n' '  <uses-feature android:name="android.hardware.camera.ar" android:required="false" />' >> "$MANIFEST"
          printf '%s\n' '  <uses-feature android:name="android.hardware.touchscreen" android:required="false" />' >> "$MANIFEST"
          printf '%s\n' '  <application android:label="@string/app_name" android:icon="@mipmap/app_icon" android:theme="@style/UnityThemeSelector">' >> "$MANIFEST"
          printf '%s\n' '    <activity android:name="com.unity3d.player.UnityPlayerActivity" android:label="@string/app_name" android:screenOrientation="fullSensor" android:launchMode="singleTask" android:configChanges="mcc|mnc|locale|touchscreen|keyboard|keyboardHidden|navigation|orientation|screenLayout|uiMode|screenSize|smallestScreenSize|fontScale|layoutDirection|density" android:hardwareAccelerated="false" android:exported="true">' >> "$MANIFEST"
          printf '%s\n' '      <intent-filter><action android:name="android.intent.action.MAIN" /><category android:name="android.intent.category.LAUNCHER" /></intent-filter>' >> "$MANIFEST"
          printf '%s\n' '      <meta-data android:name="unityplayer.UnityActivity" android:value="true" />' >> "$MANIFEST"
          printf '%s\n' '    </activity>' >> "$MANIFEST"
          printf '%s\n' '  </application>' >> "$MANIFEST"
          printf '%s\n' '</manifest>' >> "$MANIFEST"
          echo "Created AndroidManifest.xml:"
          cat "$MANIFEST"

      - name: Build Android APK (Release)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1
          targetPlatform: Android
          androidExportType: androidPackage
          androidTargetSdkVersion: AndroidApiLevel34
          androidMinSdkVersion: AndroidApiLevel24
          androidArchitecture: ARM64
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          buildName: NomadGo-SpatialVision
          versioning: Semantic
          allowDirtyBuild: true

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: NomadGo-SpatialVision-Release-APK
          path: build/Android
          retention-days: 30

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "NomadGo SpatialVision v${{ github.run_number }}"
          body: |
            ## NomadGo SpatialVision - Release Build
            - Signed Release APK (arm64-v8a)
            - Compatible with Moto G84 5G (Android 15)
            - OpenGL ES 2.0 minimum (compatible with all devices)
            - ARCore optional
          files: build/Android/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
