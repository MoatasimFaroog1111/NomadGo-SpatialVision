name: Build Android APK (Release)

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  buildForAndroid:
    name: Build for Android (Release Signed)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Free Disk Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Build Android APK (Release)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1
          targetPlatform: Android
          androidExportType: androidPackage
          androidTargetSdkVersion: AndroidApiLevel34
          androidMinSdkVersion: AndroidApiLevel24
          androidArchitecture: ARM64
          androidKeystoreBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          androidKeystorePass: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          androidKeyaliasName: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          androidKeyaliasPass: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          buildName: NomadGo-SpatialVision
          versioning: Semantic
          allowDirtyBuild: true

      - name: Patch APK glEsVersion for Moto G84 5G
        run: |
          APK=$(find build/Android -name "*.apk" | head -1)
          echo "Patching: $APK"
          TMP_APK="/tmp/patched.apk"
          python3 -c "
          import sys, zipfile, struct, os
          apk = '$APK'
          tmp = '$TMP_APK'
          with zipfile.ZipFile(apk, 'r') as z:
              manifest = bytearray(z.read('AndroidManifest.xml'))
          patched = 0
          for i in range(0, len(manifest)-8, 4):
              v = struct.unpack_from('<I', manifest, i)[0]
              if v == 0x00030000 and i >= 4:
                  p = struct.unpack_from('<I', manifest, i-4)[0]
                  if p == 0x11000008:
                      struct.pack_into('<I', manifest, i, 0x00020000)
                      patched += 1
                      print(f'Patched offset {i}')
          print(f'Total: {patched} patches')
          with zipfile.ZipFile(apk, 'r') as zin:
              with zipfile.ZipFile(tmp, 'w') as zout:
                  for item in zin.infolist():
                      if item.filename == 'AndroidManifest.xml':
                          zout.writestr(item, bytes(manifest))
                      else:
                          zout.writestr(item, zin.read(item.filename))
          print('Repacked OK')
          "
          cp "$TMP_APK" "$APK"
          echo "Patch complete: $(ls -lh $APK)"

      - name: Re-sign APK
        run: |
          APK=$(find build/Android -name "*.apk" | head -1)
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore
          sudo apt-get install -y zipalign apksigner 2>/dev/null || true
          ALIGNED="/tmp/aligned.apk"
          SIGNED="/tmp/signed.apk"
          zipalign -f -p 4 "$APK" "$ALIGNED" && echo "Aligned OK" || cp "$APK" "$ALIGNED"
          apksigner sign \
            --ks /tmp/release.keystore \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASS }}" \
            --ks-key-alias "${{ secrets.ANDROID_KEYALIAS_NAME }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEYALIAS_PASS }}" \
            --out "$SIGNED" \
            "$ALIGNED" && echo "Signed OK" || cp "$ALIGNED" "$SIGNED"
          cp "$SIGNED" "$APK"
          apksigner verify "$APK" && echo "Verification OK" || echo "Verify warning"
          ls -lh build/Android/

      - name: Upload Signed APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: NomadGo-SpatialVision-Release-APK
          path: build/Android
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "NomadGo SpatialVision v${{ github.run_number }}"
          body: |
            ## NomadGo SpatialVision - Release Build
            - Signed Release APK (arm64-v8a)
            - Min SDK: Android 7.0 (API 24)
            - Target SDK: Android 14 (API 34)
            - Compatible with Moto G84 5G (Android 15)
            - OpenGL ES 2.0 (patched for maximum compatibility)
            - ARCore optional
          files: build/Android/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
